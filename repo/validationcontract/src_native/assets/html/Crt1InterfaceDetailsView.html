<aw-panel-body exist-when="ctx.architectureCtx.splitPanelLocation == 'bottom'">        
        <aw-column width="fill">
            <aw-command-sub-panel panel-id="interfacePrimaryTable"></aw-command-sub-panel>      
        </aw-column>
        <aw-splitter> </aw-splitter>
        <aw-column width="fill">         
            <aw-command-sub-panel panel-id="Crt1InterfaceSecondaryTable"></aw-command-sub-panel>
        </aw-column>     
    </aw-panel-body>
 
     
    <aw-panel-body exist-when="ctx.architectureCtx.splitPanelLocation == 'right'">
        <aw-row height="fill">
            <aw-command-sub-panel panel-id="interfacePrimaryTable"></aw-command-sub-panel>
        </aw-row>
        <aw-splitter direction="HORIZONTAL"> </aw-splitter>
        <aw-row height="fill">         
            <aw-command-sub-panel panel-id="Crt1InterfaceSecondaryTable"></aw-command-sub-panel>
        </aw-row>     
</aw-panel-body>
