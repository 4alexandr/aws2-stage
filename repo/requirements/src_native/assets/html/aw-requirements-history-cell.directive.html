
<div class="aw-requirements-compareHistory" >
    <div class="aw-requirements-compareHeader aw-splm-tableHeaderCell" ng-mouseover="ShowOpenCommand($event)"  ng-mouseleave="hideOpenCommand($event)">
        <div class="aw-requirements-historyHeaderCell aw-splm-tableCellContents">
            <div class="aw-splm-tableHeaderCellLabel">{{vmo.props[6].propName}} : </div>
            <label title="{{vmo.object_string[0]}}">{{vmo.props[6].propValues[0]}}</label>
        </div>
        <div class="aw-requirements-historyHeaderCell aw-splm-tableCellContents">
            <div class="aw-splm-tableHeaderCellLabel">{{vmo.props[3].propName}} : </div>
            <label title="{{vmo.revision_number[0]}}">{{vmo.props[3].propValues[0]}}</label>
        </div>
        <div class="aw-requirements-historyHeaderCell aw-splm-tableCellContents">
            <div class="aw-splm-tableHeaderCellLabel">{{vmo.props[2].propName}} : </div>
            <label title="{{vmo.last_mod_date[0]}}">{{vmo.props[2].propValues[0]}}</label>
        </div>
        <div class="aw-requirements-historyHeaderCell aw-splm-tableCellContents">
            <div class="aw-splm-tableHeaderCellLabel">{{vmo.props[1].propName}} : </div>
            <label title="{{vmo.last_mod_user[0]}}">{{vmo.props[1].propValues[0]}}</label>
        </div>
        <div class="aw-requirements-historyHeaderCell aw-splm-tableCellContents">
            <div class="aw-splm-tableHeaderCellLabel">{{vmo.props[0].propName}} : </div>
            <label title="{{vmo.last_mod_user[0]}}">{{vmo.props[0].propValues[0]}}</label>
        </div>
        <div class="aw-requirements-history-openCommand hidden" >
            <img ng-click="openInNewTab(vmo)" class="aw-layout-right aw-splm-tableMenuButton">
        </div>
    </div>
    <aw-break></aw-break>
    <div class="aw-requirements-compareContent aw-richtexteditor-documentPanel aw-richtexteditor-document" >
    </div>
</div>
