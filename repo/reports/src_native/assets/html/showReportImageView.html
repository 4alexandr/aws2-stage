<aw-row visible-when="conditions.dispInstructions">
    <aw-panel visible-when="conditions.dispInstructions">
        <aw-row>
            <aw-column width="8">
                <aw-label class="aw-reports-instructionsLabel" id="instructionswidget" prop="data.instructionsTitle"></aw-label>
            </aw-column>
            <aw-column width="4"></aw-column>
        </aw-row>
    </aw-panel>
</aw-row>
<aw-row visible-when="!conditions.dispInstructions">
    <aw-chip-list dataprovider="data.dataProviders.filtersDataProvider" action="removeFilterAction" ui-icon-action="removeFilterAction"></aw-chip-list>
</aw-row>
<aw-row visible-when="!conditions.dispInstructions" height="fill">
    <aw-panel>
        <aw-panel-header>
            <aw-row>
                <aw-column width="4">
                    <aw-label prop="data.totalFoundString" visible-when="conditions.totalFoundDone" id="totalFoundLabel"></aw-label>
                    <aw-label prop="data.timeOfRequest" visible-when="conditions.totalFoundDone" id="timeOfRequestLabel"></aw-label>
                </aw-column>
                <aw-column width="4">
                    <aw-label class="aw-reports-titleLabel" prop="data.title" id="titleReport" visible-when="conditions.titleChosen"></aw-label>
                </aw-column>
                <aw-column width="4"></aw-column>
            </aw-row>
        </aw-panel-header>
        <aw-panel-body>
            <aw-row exist-when="conditions.oneCharts">
                <!-- when only first chart is selected -->
                <aw-column width="12" exist-when="conditions.dataReady1" visible-when="conditions.chartReadyGen1">
                    <aw-label prop="data.noChartData" exist-when="data.chart1NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart1" name="Chart1Section" id="Chart1Section"></aw-chart>
                </aw-column>
                <!-- when only second chart is selected -->
                <aw-column width="12" exist-when="conditions.dataReady2" visible-when="conditions.chartReadyGen2">
                    <aw-label prop="data.noChartData" exist-when="data.chart2NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart2" name="Chart2Section" id="Chart2Section"></aw-chart>
                </aw-column>
                <!-- when only third chart is selected -->
                <aw-column width="12" exist-when="conditions.dataReady3" visible-when="conditions.chartReadyGen3">
                    <aw-label prop="data.noChartData" exist-when="data.chart3NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart3" name="Chart3Section" id="Chart3Section"></aw-chart>
                </aw-column>
            </aw-row>
            <aw-row exist-when="conditions.twoCharts">
                <!-- conditions to show two charts layout -->
                <aw-column width="6" exist-when="conditions.dataReady1" visible-when="conditions.chartReadyGen1">
                    <aw-label prop="data.noChartData" exist-when="data.chart1NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart1" name="Chart1Section" id="Chart1Section"></aw-chart>
                </aw-column>
                <aw-column width="6" exist-when="conditions.dataReady2" visible-when="conditions.chartReadyGen2">
                    <aw-label prop="data.noChartData" exist-when="data.chart2NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart2" name="Chart2Section" id="Chart2Section">
                    </aw-chart>
                </aw-column>
                <aw-column width="6" exist-when="conditions.dataReady3" visible-when="conditions.chartReadyGen3">
                    <aw-label prop="data.noChartData" exist-when="data.chart3NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart3" name="Chart3Section" id="Chart3Section"></aw-chart>
                </aw-column>
            </aw-row>
            <aw-row exist-when="conditions.threeCharts">
                <aw-column width="4">
                    <aw-label prop="data.noChartData" exist-when="data.chart1NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart1" exist-when="conditions.dataReady1" visible-when="conditions.chartReadyGen1" name="Chart1Section" id="Chart1Section"></aw-chart>
                </aw-column>
                <aw-column width="4">
                    <aw-label prop="data.noChartData" exist-when="data.chart2NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart2" exist-when="conditions.dataReady2" visible-when="conditions.chartReadyGen2" name="Chart2Section" id="Chart2Section"></aw-chart>
                </aw-column>
                <aw-column width="4">
                    <aw-label prop="data.noChartData" exist-when="data.chart3NoData"></aw-label>
                    <aw-chart chart-provider="data.chartProviders.genericChart3" exist-when="conditions.dataReady3" visible-when="conditions.chartReadyGen3" name="Chart3Section" id="Chart3Section"></aw-chart>
                </aw-column>
            </aw-row>
        </aw-panel-body>
    </aw-panel>
</aw-row>
<!-- will display table in this position when there is at least on chart -->
<aw-row exist-when="conditions.dataReadyTable || conditions.dataReadyTableNoCharts" height="35%">
    <aw-splm-table gridid="gridView"></aw-splm-table>
</aw-row>
