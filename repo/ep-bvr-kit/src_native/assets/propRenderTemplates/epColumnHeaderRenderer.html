<%
    let imagePath =  basePath + '/image/';
    let columnName = _.get( column, 'field' );
    let displayName = _.get( column, 'propertyDisplayName' );

    let cellImg;
     switch ( columnName ) {
        case 'graphicVisibility':
            cellImg = imagePath + 'miscTableHeaderDisplayState16.svg';
            break
        }
%>

<img class="aw-visual-indicator" src="<%=cellImg%>" alt="<%=displayName%>" title="<%=displayName%>">
