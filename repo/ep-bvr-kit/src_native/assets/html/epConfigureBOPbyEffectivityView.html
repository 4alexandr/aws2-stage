<aw-popup2>
    <aw-form name="configureBOPbyEffectivityForm">
        <aw-panel-body>
            <aw-include name="epRevisionRuleListWidget" sub-panel-context="data"></aw-include>
            <span exist-when="conditions.isUnitEffectivity">
                <aw-numeric prop="data.configurePlanUnit"></aw-numeric>
                <h4>{{data.endItemLable.propertyDisplayName}}</h4>
                <aw-search-box prop="data.endItemSearchBox" placeholder="data.endItemSearchBoxPlaceHolder"
                    action="searchEndItem">
                </aw-search-box>
                <aw-flex-row offset="1f">
                    <div class="aw-epMaturity-configurePlanSearchResultArea">
                        <aw-flex-row align-content="center" offset="1" justify="left">
                            <aw-flex-column justify="center" align-content="start">
                                <span exist-when="conditions.showSearchingLabel"
                                    class="aw-epMaturity-configurePlanLoadingLabel">{{data.loadingLable.dbValue}}</span>
                            </aw-flex-column>
                        </aw-flex-row>
                        <aw-list dataprovider="data.dataProviders.performSearchForEndItem">
                            <aw-default-cell vmo="item"></aw-default-cell>
                        </aw-list>
                    </div>
                </aw-flex-row>
            </span>
            <span class="aw-epMaturity-configurePlanDatePickerSpan" exist-when="!conditions.isUnitEffectivity">
                <aw-date prop="data.configurePlanToDate"></aw-date>
            </span>
        </aw-panel-body>
        <aw-panel-footer>
            <aw-button size="auto" button-type="base" action="closePopupWindow">
                <aw-i18n>i18n.closeBtnText</aw-i18n>
            </aw-button>
            <aw-button size="auto"
                enable-when="conditions.isUnitEffectivity ? configureBOPbyEffectivityForm.$valid && conditions.enableOpenConfiguredPlanButtonForUnitEffectivity : configureBOPbyEffectivityForm.$valid"
                action="openConfigurePlan">
                <aw-i18n>i18n.configurePlanBtnText</aw-i18n>
            </aw-button>
        </aw-panel-footer>
    </aw-form>
</aw-popup2>
