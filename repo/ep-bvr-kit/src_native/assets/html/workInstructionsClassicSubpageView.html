<aw-include exist-when="!ctx.epPageContext.loadedObject.uid || !ctx.ep.scopeObject.uid" name="mfeLoadingMessage"></aw-include>
<aw-flex-row exist-when="ctx.epPageContext.loadedObject.uid && ctx.ep.scopeObject.uid" height="12">
    <aw-flex-column width="3">
        <aw-include name="wiNavigationArea"></aw-include>
    </aw-flex-column>
    <aw-splitter class="aw-mfe-transparentSplitter"></aw-splitter>
    <aw-flex-column width = "fill">
        <aw-flex-row visible-when="ctx.epPageContextCommandPanelLarge" height = "fill">
            <aw-flex-column width="fill" >
                <aw-include name="epValidation"></aw-include>
            </aw-flex-column>
        </aw-flex-row>
        <aw-flex-row visible-when="!ctx.epPageContextCommandPanelLarge" height = "fill">
            <aw-flex-column class="{{conditions.isSyncedWithEditor ? 'aw-ep-wiEditorArea aw-mfe-activeContentPanel' : 'aw-ep-wiEditorArea'}}">
                <aw-flex-row height="7">
                    <aw-include name="wiEditorArea"></aw-include>
                </aw-flex-row>
                <aw-splitter direction="HORIZONTAL" class="aw-mfe-transparentSplitter"></aw-splitter>
                <aw-flex-row height="5">
                    <aw-include name="wiDetailsArea"></aw-include>
                </aw-flex-row>
            </aw-flex-column>
            <aw-splitter class="aw-mfe-transparentSplitter"></aw-splitter>
            <aw-flex-column class="{{conditions.isSyncedWithViewer ? 'aw-ep-wiGraphicsArea aw-mfe-activeContentPanel' : 'aw-ep-wiGraphicsArea'}}"  >
                <aw-flex-row height="9">
                    <aw-include name="wiGraphicsArea"></aw-include>
                </aw-flex-row>
                <aw-flex-row height="3">
                    <aw-include name="wiVisualsArea"></aw-include>
                </aw-flex-row>
            </aw-flex-column>
        </aw-flex-row>
    </aw-flex-column>
</aw-flex-row>
