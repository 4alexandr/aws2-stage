<aw-flex-column>
    <aw-flex-row height="3.6f" align-content="center">
        <aw-advanced-bar type="TOOLBAR">
            <aw-flex-row height="3.4f" align-content="start" justify="space-between">
                <aw-flex-column align-content="end" width="10" exist-when="data.tabs.length === 1">
                    <aw-flex-row height="fill" align-content="start" justify="space-between">
                        <label class="aw-epValidation-title">{{data.tabs[0].name}}</label>
                        <aw-include name={{subPanelContext.additionalHeaderComponent}}></aw-include>
                    </aw-flex-row>
                </aw-flex-column>
                <aw-flex-column align-content="end" width="2" aw-repeat="tab : data.tabs" exist-when="data.selectedTab.tabKey == tab.tabKey">
                    <aw-command-bar context="tab" anchor="{{tab.viewId ? tab.viewId : tab.tabKey}}_uiAnchor" alignment="HORIZONTAL">
                    </aw-command-bar>
                </aw-flex-column>
            </aw-flex-row>
        </aw-advanced-bar>
    </aw-flex-row>
    <aw-flex-row height="fill" class="aw-mfe-contentPanel">
        <aw-include aw-repeat="tab : data.tabs" view-id="{{tab.viewId ? tab.viewId : tab.tabKey}}" name="{{tab.tabKey}}" sub-panel-context="tab" exist-when="data.selectedTab.tabKey == tab.tabKey"> </aw-include>
    </aw-flex-row>
</aw-flex-column>
