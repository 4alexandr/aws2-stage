<aw-flex-column width="fill">
    <aw-flex-row height="fill">
       <aw-include exist-when="!ctx.epValidationContext['epValidationResults']" name="epValidationMessageArea" ></aw-include>
       <aw-include exist-when="ctx.epValidationContext['epValidationResults'] && ctx.epValidationContext['epValidationGetNewResults'] === 'false'" name="epValidationResultArea" ></aw-include>
    </aw-flex-row>
    <aw-splitter class="aw-mfe-transparentSplitter" direction="HORIZONTAL" visible-when="conditions.isSingleObjectSelected"></aw-splitter>
    <aw-flex-row exist-when="conditions.isSingleObjectSelected" height="fill">
       <aw-include name="epValidationDetailArea" ></aw-include>
    </aw-flex-row>
</aw-flex-column>
