<aw-popup2 caption="{{::i18n.failedToMapAssignments}}">
    <aw-panel>
        <aw-panel-body>
            <aw-flex-column>
                <div class="aw-ngp-cloneAssignmentFailures">
                    <div class="aw-ngp-cloneAssignmentFailuresIcon">
                        <aw-image source="data.errorIcon" is-icon="true"></aw-image>
                    </div>

                    <div class="aw-ngp-cloneAignmentFailuresMsg">
                        {{data.totalAssignmentFailures}}
                    </div>
                </div>
                <div aw-repeat="pe : subPanelContext.rowsPerPe">
                    <aw-include name="ngpCloneAssignmentFailuresTable" sub-panel-context="pe"></aw-include>
                </div>
            </aw-flex-column>
        </aw-panel-body>
    </aw-panel>
    <aw-panel-footer>
        <aw-button button-type="base" action="closeDialog" size="auto">{{i18n.close}}</aw-button>
    </aw-panel-footer>
</aw-popup2>
