<div class="aw-layout-flexRow">

    <!-- Cell default selected diagram checkmark placeholder -->
    <div class="ase0IsDefaultDiagramcheckmark">
        <aw-property-image exist-when="vmo.ase0IsDefaultDiagram" name="cmdCheckmark"></aw-property-image>
    </div>

    <!-- Cell list image -->
    <div class="aw-widgets-cellListCellImage">
        <aw-model-icon vmo="vmo"></aw-model-icon>
    </div>
    <!-- Cell list content -->
    <div class="aw-widgets-cellListCellContent">
        <aw-default-cell-content vmo="vmo" ng-dblclick="previewDiagram()" ></aw-default-cell-content>
    </div>
    <div ng-transclude ng-class="[ {'hidden': !vmo.selected},{'visible': vmo.selected},{'aw-widgets-cellListCellCommandBarHover':!vmo.selected}]">
    </div>
</div>
