<div id="aw-pdf-viewer">
    <div ng-if="viewerHeaderProperties" class="aw-viewerjs-header">
        <aw-viewer-header data="viewerHeaderProperties"></aw-viewer-header>
    </div>
    <div ng-if="loading" class="aw-jswidgets-text">{{loadingMsg}}</div>
    <div ng-if="!loading" class="aw-pdfjs-pdfPane aw-pdfjs-pdfPaneViewer aw-pdfjs-pdfViewerIFrameWidget"
        ng-style="{'height': viewerHeight}">
        <iframe title="{{frameTitle}}" class="aw-pdfjs-pdfViewerIFrame" ng-src="{{viewUrl}}"
            aw-on-load="contentLoadComplete()" allowfullscreen="1" ></iframe>
    </div>
</div>
