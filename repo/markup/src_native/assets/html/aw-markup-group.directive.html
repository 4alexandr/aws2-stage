<div ng-if="vmo && vmo.groupName">
    <aw-icon class="aw-ui-filterCategoryLabelExpand" ng-click="toggleGroup(vmo)"
    icon-id="miscExpand" ng-show="vmo.expanded"></aw-icon>
    <aw-icon class="aw-ui-filterCategoryLabelCollapse" ng-click="toggleGroup(vmo)"
    icon-id="miscCollapse" ng-show="! vmo.expanded"></aw-icon>
    <div class="aw-ui-filterCategoryLabel aw-ui-filterCategoryLabelEnabled" ng-click="toggleGroup(vmo)">
       {{vmo.groupName | toI18n }}
    </div>
</div>
<div ng-if="vmo && ! vmo.groupName">
    <aw-markup-cell vmo="vmo" ></aw-markup-cell>
</div>
