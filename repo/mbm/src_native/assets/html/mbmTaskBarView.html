<aw-flex-row height="4f" class="aw-taskbar-container afx-accent-background">
    <aw-flex-row class="aw-layout-fill">
        <taskbar-header exist-when="conditions.isTaskbarFullScreen"  task-name="ctx.taskPageContext.taskName" subtask-name="ctx.taskPageContext.subTaskName" context-Object="ctx.taskPageContext.ccName">
        </taskbar-header>
        <aw-flex-column justify="center">
            <aw-flex-row>
                <aw-separator exist-when="conditions.isTaskbarFullScreen && ctx.taskPageContext.cnObject" is-vertical="true"></aw-separator>
                <aw-flex-column justify="center" exist-when="ctx.taskPageContext.cnObject">
                    <aw-include name="mbmCnIndication" sub-panel-context="data.ecnInfo"></aw-include>
                </aw-flex-column>
            </aw-flex-row>
        </aw-flex-column>
    </aw-flex-row>
    <aw-flex-column justify="center" class="aw-layout-fill" width="5.8f" align-content="end">
        <aw-command-bar anchor="toolbarRightSlot" alignment="HORIZONTAL"></aw-command-bar>
    </aw-flex-column>
</aw-flex-row>
