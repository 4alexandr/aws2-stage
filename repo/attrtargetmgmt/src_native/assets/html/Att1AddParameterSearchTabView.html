<aw-panel-body scrollable="false">
    <aw-panel-section>
        <aw-search-box prop="data.searchBox" action="search"></aw-search-box>
        <aw-break></aw-break>
        <aw-tab-set tabs="data.addObjectSearchTabsModel.dbValue" visible-when="conditions.showSearchFilterPanel"></aw-tab-set>
    </aw-panel-section>
</aw-panel-body>
<aw-panel-footer >
        <aw-button  action="startGetSoaInput" enable-when="!ctx.addItemEventProgressing" visible-when="conditions.showAdd && conditions.isTcReleaseAtLeast122">
            <aw-i18n>i18n.add</aw-i18n>
        </aw-button>
        <aw-button default="false" action="startGetSoaInputDataForAddParamAsCopy" enable-when="!ctx.addItemEventProgressing" visible-when="conditions.showAdd">
            <aw-i18n>i18n.addAsCopy</aw-i18n>
        </aw-button>
</aw-panel-footer>
