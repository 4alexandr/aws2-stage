<aw-panel-body exist-when="ctx.effIntents.isAddEffectivity===false">
    <aw-aps-effectivity data="data"></aw-aps-effectivity>
    <aw-include class="aw-aps-effectivityIntentContainer" name="ApsEffectivityIntentSub"></aw-include>
</aw-panel-body>
<aw-panel-footer>

        </aw-button>
    </div>
</aw-panel-footer>
