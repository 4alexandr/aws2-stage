<aw-panel-body >
     <aw-column width="fill" exist-when="ctx.interfaceDetails.isPortSelected">
        <aw-command-sub-panel panel-id="attributesTable" isolate-mode="true"></aw-command-sub-panel>
     </aw-column>
     <aw-column width="fill" exist-when="ctx.interfaceDetails.isConnectionSelected && ctx.preferences.AWC_Enable_Interface_Panel && ctx.interfaceDetails.totalInteractionsFound > 0" >
        <aw-command-sub-panel panel-id="Att1ShowMappedAttribute" isolate-mode="true"></aw-command-sub-panel>
     </aw-column>
</aw-panel-body>
