<aw-popup2>
    <aw-flex-row height="fill">
        <aw-flex-column>
            <aw-include name="Awp0AdhocSubProcess" sub-panel-context="data"></aw-include>
        </aw-flex-column>
    <aw-splitter direction="VERTICAL" exist-when="ctx.openCategoriesPanel"> </aw-splitter>
    <aw-flex-column exist-when="ctx.openCategoriesPanel && ctx.openUserPickerPanel" width="25f">
            <aw-include name="Awp0SubmitToWorkflowCategoriesSubPanel" sub-panel-context="data"></aw-include>
    </aw-flex-column>
    <aw-splitter direction="VERTICAL" exist-when="ctx.openUserPickerPanel"></aw-splitter>
    <aw-flex-column exist-when="ctx.openUserPickerPanel" width="25f">
            <aw-include name="Users"></aw-include>
    </aw-flex-column>
  </aw-flex-row>
</aw-popup2>
