<div class="aw-social-averageRatingBlock">
    <aw-i18n class="aw-widgets-propertyLabelTop">i18n.yourRating</aw-i18n>
    <aw-label prop="data.averageRating"></aw-label>
</div>
<div class="aw-social-starBlock">
    <div class="aw-social-summaryStarPanel">
        <aw-social-ratings ratings="data.yourRatingValue" is-editable="true"></aw-social-ratings>
    </div>
    <div class="aw-social-summaryStarPanel">
        <aw-social-ratings ratings="data.averageRatingValue" is-editable="false"></aw-social-ratings>
    </div>
</div>
