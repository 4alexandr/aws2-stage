<aw-command-panel caption="i18n.measurementTabText">
    <aw-panel-body>
        <aw-panel-section caption="i18n.pickFilteringTitleText">
            <aw-measure-tree treedata="data"></aw-measure-tree>
        </aw-panel-section>
        <aw-command-panel-section  caption="i18n.measurementSectionTitleText" visible-when="conditions.showSelectedMeasurementSection" anchor="data.measurementCommands" context="data">
            <aw-i18n  visible-when="!conditions.hasSelectedMeasurement">i18n.noMeasurementSelectedText</aw-i18n>
            <aw-widget prop="nodeProperty" aw-repeat="nodeProperty : data.selectedMeasurementProp.dbValue"></aw-widget>
        </aw-command-panel-section>
    </aw-panel-body> 
</aw-command-panel>
