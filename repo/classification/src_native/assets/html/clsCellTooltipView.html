<div>
    <div aw-repeat="cellProp:data.tooltipDetails.prop track by $index" >
        <span class="aw-cls-tooltipLabel">{{cellProp.key}}:</span>
        <span>{{cellProp.value}}</span>
        <span  exists-when="cellProp.value1" class="aw-cls-tooltipLabel">{{cellProp.value1}}</span>
    </div>
</div>
