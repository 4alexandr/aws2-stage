<aw-command-panel caption="i18n.Filters" class="aw-cls-flex">
    <div class="aw-cls-filtersTab">
        <aw-command-sub-panel panel-id="Awp0ClassificationFilter"
            visible-when="data.categories.refineCategories && !ctx.clsLocation.isVncVisible">
        </aw-command-sub-panel>
        <aw-property-non-edit-val class="aw-cls-filtersTabNoscroll" prop="data.NoPropertiesMessage" visible-when="data.attr_anno.length === 0 && ctx.clsLocation.selectedTreeNode !== null && ctx.clsLocation.isVncVisible"></aw-property-non-edit-val>
        <aw-panel-body visible-when="ctx.clsLocation.isVncVisible">
            <!-- Attributes Panel -->
            <aw-cls-properties-location attributes="data.attr_anno" view="data.panelMode" activeview="data.activeView" class="aw-cls-fullViewProperties">
            </aw-cls-properties-location>
        </aw-panel-body>
    </div>
    <aw-panel-footer>
        <aw-button exist-when="!data.autoUpdateEnabled.dbValue && data.categories.refineCategories" action="applyAllOnButton" class="aw-cls-float">
            <aw-i18n>i18n.ApplyAll</aw-i18n>
        </aw-button>
    </aw-panel-footer>
</aw-command-panel>
