<div class="aw-requirement-tooltipCell" ng-click="fireEvent(vmo)">
        <input class="aw-requirement-crossRefInput" type="radio" name="crossRefRadioBtn" ng-checked="{{vmo.checked}}"/>
        <span class="aw-requirement-tooltipCellIcon">
                <img class="aw-requirement-crossRefIcon" ng-src="{{vmo.iconURL}}" exist-when="vmo.iconURL"/>
                <span class="aw-requirement-tooltipCellLabel">{{vmo.displayName}}</span>
         </span>
</div>
