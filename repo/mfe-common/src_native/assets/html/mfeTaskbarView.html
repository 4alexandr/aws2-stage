<aw-flex-row height="4f" class="aw-taskbar-container afx-accent-background">
    <aw-advanced-bar type="TASKBAR">
        <aw-flex-row height="4f" align-content="center">
            <aw-flex-column width="fill" offset="1f">
                <aw-flex-row justify="left" visible-when="!ctx.fullscreen && !conditions.isTaskbarFullScreen">
                    <aw-layout-slot name="mfe_taskbarLeftSlot" context="data" class="aw-layout-fit" ></aw-layout-slot>
                </aw-flex-row>
            </aw-flex-column>
            <aw-flex-column width="6">
                <aw-flex-row justify="right">
                    <aw-layout-slot name="mfe_toolbar" context="data" class="aw-layout-fit" ></aw-layout-slot>
                </aw-flex-row>
            </aw-flex-column>
        </aw-flex-row>
    </aw-advanced-bar>
</aw-flex-row>
