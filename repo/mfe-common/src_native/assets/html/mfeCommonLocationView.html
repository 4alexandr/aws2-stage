<aw-flex-column width="fill">

    <aw-layout-slot name="mfe_taskBar" context="data" class="aw-layout-fit"></aw-layout-slot>
    <aw-flex-row height="fill" wrap-style="nowrap" class="aw-layout-subLocation afx-content-background aw-mfe-subpageContent">

        </aw-flex-column>
    </aw-flex-row>
