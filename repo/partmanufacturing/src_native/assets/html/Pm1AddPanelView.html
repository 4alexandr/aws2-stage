<aw-panel-header>
    <aw-panel-section caption="i18n.Pm1ToTitle">
        <aw-default-cell vmo="ctx.PartMfg.parentElement"></aw-default-cell>
    </aw-panel-section>
</aw-panel-header>
<aw-form name="createInputs">
    <aw-add  include-types="{{data.allowedTypeInfo.objectTypeName}}" type-filter="{{data.allowedTypeInfo.searchTypeName}}" load-sub-types="true" max-recent-count="5" exist-when="data.allowedTypeInfo" visible-tabs="{{data.allowedTypeInfo.allowedTabs}}" preferred-type="{{data.allowedTypeInfo.preferredType}}" is-include-sub-types="data.isIncludeSubTypes"></aw-add>
    <aw-break></aw-break>
    <aw-numeric prop="data.numberOfElements" visible-when="ctx.PartMfg.supportedFeatures.Awb0BulkAddFeature && conditions.isSingleElementSelected"></aw-numeric>
</aw-form>
<aw-panel-footer>
    <aw-button action="createAndAddResource" visible-when="createInputs.$valid && conditions.isNewTabAddButtonVisible" >
        <aw-i18n>i18n.Pm1AddElementBtn</aw-i18n>
    </aw-button>
    <aw-button action="addResources" visible-when="( conditions.isSingleElementSelected && conditions.areNumberOfElementsValid ) || conditions.areMultipleElementSelected" >
        <aw-i18n>i18n.Pm1AddElementBtn</aw-i18n>
    </aw-button>
    <aw-button default="false" action="geResourcePropertiesToCopy" visible-when="( conditions.isSingleElementSelected && ctx.PartMfg.addElement.isCopyButtonEnabled && conditions.areNumberOfElementsValid) || (conditions.areMultipleElementSelected && ctx.PartMfg.addElement.isCopyButtonEnabled)" >
        <aw-i18n>i18n.Pm1AddElementCopyButtonText</aw-i18n>
    </aw-button>
</aw-panel-footer>
